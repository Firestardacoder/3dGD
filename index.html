<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Neon Dash: Speed Controlled</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Arial Black', sans-serif; user-select: none; }
        #ui { position: absolute; top: 20px; left: 20px; color: #0ff; pointer-events: none; z-index: 10; font-size: 32px; text-shadow: 0 0 10px #0ff; }
        #start-screen, #game-over, #subject-gate { 
            position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.95); 
            color: #0ff; display: flex; flex-direction: column; justify-content: center; 
            align-items: center; z-index: 100; text-align: center;
        }
        #subject-gate { display: none; z-index: 300; background: rgba(0,0,0,0.98); }
        .subject-btn { 
            background: #111; color: #0ff; border: 2px solid #0ff; padding: 12px; 
            margin: 8px; cursor: pointer; width: 240px; font-family: 'Arial Black', sans-serif;
            transition: all 0.2s; font-size: 18px; border-radius: 5px;
        }
        .subject-btn:hover { background: #0ff; color: #000; box-shadow: 0 0 20px #0ff; }
        button.main-btn { background: #0ff; color: #000; border: none; padding: 15px 40px; font-weight: bold; cursor: pointer; font-size: 20px; margin-top: 20px; border-radius: 4px; }
        p { color: white; max-width: 600px; line-height: 1.5; }
    </style>
</head>
<body>

    <div id="start-screen">
        <h1 style="font-size: 60px; margin-bottom: 0;">NEON DASH: CONTROLLED</h1>
        <p>Speed caps at 220. Pure skill required.</p>
        <button class="main-btn" onclick="startGame()">INITIALIZE</button>
    </div>

    <div id="subject-gate">
        <h2 style="font-size: 40px; color: #ff0055;">SYSTEM RECOVERY</h2>
        <p>Pick the RANDOM safe subject to bypass the crash.</p>
        <div id="subject-buttons">
            <button class="subject-btn" onclick="checkSubject('Math')">Math</button>
            <button class="subject-btn" onclick="checkSubject('Science')">Science</button>
            <button class="subject-btn" onclick="checkSubject('ELA')">ELA</button>
            <button class="subject-btn" onclick="checkSubject('Social Studies')">Social Studies</button>
            <button class="subject-btn" onclick="checkSubject('PE')">PE</button>
        </div>
    </div>

    <div id="game-over" style="display:none">
        <h1 style="color:#ff0055; font-size: 50px;">TOTAL WIPEOUT</h1>
        <p>FINAL DISTANCE: <span id="final-score">0</span>m</p>
        <button class="main-btn" onclick="location.reload()">REBOOT</button>
    </div>

    <div id="ui">DIST: <span id="score">0</span></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        let scene, camera, renderer, player, clock, stars;
        let obstacles = [], floors = [];
        let score = 0, currentSpeed = 65, isGameOver = false, isPaused = true, targetLane = 0;
        let hasUsedLife = false, winningSubject = "";
        const laneWidth = 4.5;
        let nextObstacleZ = -100;
        
        // Speed Cap
        const MAX_SPEED = 220; 

        let isShipMode = false, spacePressed = false;
        let vy = 0;
        const GRAVITY = -85, JUMP_STRENGTH = 32, SHIP_THRUST = 190;

        function startGame() {
            if (confirm("Brain cell deletion warning. Proceed?")) {
                if (confirm("FINAL WARNING: Your GPA may never recover. Are you sure?")) {
                    document.getElementById('start-screen').style.display = 'none';
                    isPaused = false;
                    clock.start();
                }
            }
        }

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x010103);
            scene.fog = new THREE.Fog(0x010103, 40, 220);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 9, 22);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.body.appendChild(renderer.domElement);

            const starGeo = new THREE.BufferGeometry();
            const starVets = [];
            for(let i=0; i<4000; i++) starVets.push((Math.random()-0.5)*1500, (Math.random()-0.5)*1500, (Math.random()-0.5)*1500);
            starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starVets, 3));
            stars = new THREE.Points(starGeo, new THREE.PointsMaterial({color: 0xffffff, size: 0.8}));
            scene.add(stars);

            scene.add(new THREE.AmbientLight(0xffffff, 0.5));
            player = new THREE.Mesh(new THREE.BoxGeometry(1.4, 1.4, 1.4), new THREE.MeshStandardMaterial({ color: 0x00ffff, emissive: 0x00ffff, emissiveIntensity: 1.5 }));
            player.position.y = 0.7;
            scene.add(player);

            for(let i = 0; i < 15; i++) {
                const grid = new THREE.GridHelper(100, 10, 0x00ffff, 0x111111);
                grid.position.z = i * -100;
                scene.add(grid);
                floors.push(grid);
            }

            clock = new THREE.Clock(false);
            window.addEventListener('keydown', (e) => {
                if (isGameOver || isPaused) return;
                if (e.code === 'ArrowLeft' && targetLane > -1) targetLane--;
                if (e.code === 'ArrowRight' && targetLane < 1) targetLane++;
                if (e.code === 'Space' || e.code === 'ArrowUp') { 
                    spacePressed = true; 
                    if(!isShipMode && player.position.y <= 0.8) vy = JUMP_STRENGTH; 
                }
            });
            window.addEventListener('keyup', (e) => { if (e.code === 'Space' || e.code === 'ArrowUp') spacePressed = false; });
        }

        function spawnObstacle() {
            const rand = Math.random();
            let mesh;
            let type = "";

            if (rand < 0.10) { 
                type = "portal";
                const col = isShipMode ? 0x0066ff : 0x00ff66;
                mesh = new THREE.Mesh(new THREE.TorusGeometry(4.5, 0.6, 16, 32), new THREE.MeshStandardMaterial({ color: col, emissive: col, emissiveIntensity: 3.5 }));
                mesh.userData.portalTo = isShipMode ? "normal" : "ship";
                mesh.position.y = 7;
                mesh.position.x = 0;
            } else if (rand < 0.45) { 
                mesh = new THREE.Group();
                const count = Math.random() > 0.6 ? 3 : 1;
                for(let i=0; i<count; i++) {
                    const s = new THREE.Mesh(new THREE.ConeGeometry(1.5, 3.8, 4), new THREE.MeshStandardMaterial({color: 0xff0055, emissive: 0xff0055, emissiveIntensity: 2.5}));
                    s.position.z = i * -4;
                    mesh.add(s);
                }
                mesh.position.y = 1.9;
                type = "spike";
            } else if (rand < 0.70) { 
                mesh = new THREE.Mesh(new THREE.BoxGeometry(laneWidth * (Math.random() > 0.85 ? 2 : 1), 12, 2.5), new THREE.MeshStandardMaterial({color: 0xaa00ff, emissive: 0xaa00ff, emissiveIntensity: 2}));
                mesh.position.y = Math.random() > 0.5 ? 12 : 5; 
                type = "wall";
            } else { 
                mesh = new THREE.Mesh(new THREE.CylinderGeometry(1.3, 1.3, 28, 8), new THREE.MeshStandardMaterial({color: 0xffaa00, emissive: 0xffaa00, emissiveIntensity: 2}));
                mesh.position.y = 14;
                mesh.userData.isMoving = true;
                mesh.userData.moveDir = (Math.random() - 0.5) * 2;
                type = "pillar";
            }

            if(type !== "portal") mesh.position.x = (Math.floor(Math.random() * 3) - 1) * laneWidth;
            mesh.position.z = player.position.z - 200;
            mesh.userData.type = type;
            scene.add(mesh);
            obstacles.push(mesh);
            
            let gap = Math.max(30, 70 - (score * 0.12));
            nextObstacleZ = player.position.z - gap;
        }

        function animate() {
            if (isGameOver) return;
            requestAnimationFrame(animate);
            if (isPaused) { renderer.render(scene, camera); return; }

            const delta = Math.min(clock.getDelta(), 0.05);
            
            // --- SPEED CAP LOGIC ---
            if (currentSpeed < MAX_SPEED) {
                let accel = 1 - (currentSpeed / MAX_SPEED);
                currentSpeed += (3.0 * accel) * delta * 60;
            }

            player.position.z -= currentSpeed * delta;
            score = Math.floor(Math.abs(player.position.z) / 10);
            document.getElementById('score').innerText = score;
            stars.position.z = player.position.z;

            if (isShipMode) {
                if (spacePressed) vy += SHIP_THRUST * delta;
                vy += GRAVITY * delta;
                player.position.y += vy * delta;
                player.rotation.x = -vy * 0.012;
                if (player.position.y < 0.7) { player.position.y = 0.7; vy = 0; }
                if (player.position.y > 18) { player.position.y = 18; vy = 0; }
            } else {
                player.position.y += vy * delta;
                if (player.position.y > 0.7) { vy += GRAVITY * delta; player.rotation.x -= 16 * delta; }
                else { player.position.y = 0.7; vy = 0; player.rotation.x = 0; }
            }

            player.position.x += (targetLane * laneWidth - player.position.x) * 16 * delta;
            camera.position.z = player.position.z + 26;
            camera.lookAt(player.position.x, 6, player.position.z - 20);

            if (player.position.z < nextObstacleZ) spawnObstacle();

            const pBox = new THREE.Box3().setFromObject(player);
            for (let i = obstacles.length - 1; i >= 0; i--) {
                const o = obstacles[i];
                if (o.position.z > player.position.z + 40) { scene.remove(o); obstacles.splice(i, 1); continue; }

                if (o.userData.isMoving) {
                    o.position.x += o.userData.moveDir * 22 * delta;
                    if (Math.abs(o.position.x) > 12) o.userData.moveDir *= -1;
                }

                const oBox = new THREE.Box3().setFromObject(o);
                oBox.expandByVector(new THREE.Vector3(-0.4, -0.4, -0.4)); 

                if (pBox.intersectsBox(oBox)) {
                    if (o.userData.type === "portal") {
                        isShipMode = (o.userData.portalTo === "ship");
                        vy *= 0.2;
                        scene.remove(o); obstacles.splice(i, 1);
                        scene.background = new THREE.Color(isShipMode ? 0x051a05 : 0x05051a);
                        setTimeout(()=>scene.background = new THREE.Color(0x010103), 200);
                    } else { die(); }
                }
            }
            floors.forEach(f => { if (f.position.z > player.position.z + 100) f.position.z -= 1500; });
            renderer.render(scene, camera);
        }

        function die() {
            if (!hasUsedLife && score > 40) {
                isPaused = true;
                const subjects = ['Math', 'Science', 'ELA', 'Social Studies', 'PE'];
                winningSubject = subjects[Math.floor(Math.random() * subjects.length)];
                document.getElementById('subject-gate').style.display = 'flex';
            } else {
                isGameOver = true;
                document.getElementById('game-over').style.display = 'flex';
                document.getElementById('final-score').innerText = score;
            }
        }

        function checkSubject(choice) {
            document.getElementById('subject-gate').style.display = 'none';
            if (choice === winningSubject) {
                hasUsedLife = true; isPaused = false;
                obstacles.forEach(o => scene.remove(o));
                obstacles = [];
                vy = isShipMode ? 0 : JUMP_STRENGTH;
                scene.background = new THREE.Color(0x00ff00);
                setTimeout(()=>scene.background = new THREE.Color(0x010103), 400);
            } else {
                isGameOver = true;
                document.getElementById('game-over').style.display = 'flex';
                document.getElementById('final-score').innerText = score;
            }
        }
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>

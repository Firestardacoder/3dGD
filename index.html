<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Dash: Definitive Edition</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Arial Black', sans-serif; }
        #ui { position: absolute; top: 20px; left: 20px; color: #fff; pointer-events: none; z-index: 10; }
        #score { font-size: 48px; text-shadow: 0 0 20px #0ff; }
        #game-over { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #fff; text-align: center; display: none; background: rgba(0,0,0,0.95); 
            padding: 50px; border: 4px solid #0ff; z-index: 100; box-shadow: 0 0 50px #ff0055;
        }
        #start-screen {
            position: absolute; width: 100%; height: 100%; background: #000; 
            color: #0ff; display: flex; flex-direction: column; justify-content: center; 
            align-items: center; z-index: 200;
        }
        button { background: #0ff; color: #000; border: none; padding: 15px 40px; font-weight: bold; cursor: pointer; border-radius: 4px; font-size: 20px; }
    </style>
</head>
<body>
    <div id="start-screen">
        <h1>NEON DASH 3D</h1>
        <p>SPACE to Jump | ARROWS to Move</p>
        <button onclick="startGame()">START ENGINE</button>
    </div>

    <div id="ui"><div id="score">0</div></div>

    <div id="game-over">
        <h1 style="color:#ff0055">CORE SHUTDOWN</h1>
        <p>Final Score: <span id="final-score">0</span></p>
        <button onclick="location.reload()">REBOOT</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>

    <script>
        let scene, camera, renderer, player, clock, composer;
        let obstacles = [], floors = [];
        let score = 0, currentSpeed = 50, isGameOver = false, isPaused = true, targetLane = 0;
        const laneWidth = 4;
        let nextObstacleZ = -100;

        let vy = 0;
        const GRAVITY = -60;
        const JUMP_STRENGTH = 24;

        function startGame() {
            document.getElementById('start-screen').style.display = 'none';
            isPaused = false;
            clock.start();
        }

        // Handle Tab Switching
        document.addEventListener("visibilitychange", () => {
            if (document.hidden) isPaused = true;
            else if (!isGameOver && document.getElementById('start-screen').style.display === 'none') isPaused = false;
        });

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x010103);
            scene.fog = new THREE.Fog(0x010103, 20, 140);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 7, 18);

            renderer = new THREE.WebGLRenderer({ antialias: false });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            const renderPass = new THREE.RenderPass(scene, camera);
            const bloomPass = new THREE.UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.8, 0.4, 0.8);
            composer = new THREE.EffectComposer(renderer);
            composer.addPass(renderPass);
            composer.addPass(bloomPass);

            player = new THREE.Mesh(
                new THREE.BoxGeometry(1.2, 1.2, 1.2),
                new THREE.MeshPhongMaterial({ color: 0x00ffff, emissive: 0x00ffff, emissiveIntensity: 2.5 })
            );
            player.position.y = 0.6;
            scene.add(player);

            scene.add(new THREE.AmbientLight(0xffffff, 0.3));
            
            for(let i = 0; i < 10; i++) {
                const grid = new THREE.GridHelper(100, 10, 0x00ffff, 0x111111);
                grid.position.z = i * -100;
                scene.add(grid);
                floors.push(grid);
            }

            clock = new THREE.Clock(false);

            window.addEventListener('keydown', (e) => {
                if (isGameOver || isPaused) return;
                if (e.code === 'ArrowLeft' && targetLane > -1) targetLane--;
                if (e.code === 'ArrowRight' && targetLane < 1) targetLane++;
                if ((e.code === 'Space' || e.code === 'ArrowUp') && player.position.y <= 0.7) vy = JUMP_STRENGTH;
            });
        }

        function spawnObstacle() {
            const isSpike = Math.random() < 0.5;
            const geo = isSpike ? new THREE.ConeGeometry(1.6, 3.2, 4) : new THREE.BoxGeometry(3.5, 10, 2);
            const mat = new THREE.MeshPhongMaterial({ 
                color: isSpike ? 0xff0055 : 0xffff00, 
                emissive: isSpike ? 0xff0055 : 0xffaa00, 
                emissiveIntensity: 3 
            });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.set((Math.floor(Math.random() * 3) - 1) * laneWidth, isSpike ? 1.6 : 5, player.position.z - 160);
            mesh.userData = { type: isSpike ? "spike" : "wall" };
            scene.add(mesh);
            obstacles.push(mesh);
            nextObstacleZ = player.position.z - (35 + Math.random() * 25);
        }

        function animate() {
            if (isGameOver) return;
            requestAnimationFrame(animate);
            if (isPaused) return;

            const delta = Math.min(clock.getDelta(), 0.05);

            currentSpeed += 1.2 * delta;
            player.position.z -= currentSpeed * delta;
            score = Math.floor(Math.abs(player.position.z) / 10);
            document.getElementById('score').innerText = score;

            // Jump
            player.position.y += vy * delta;
            if (player.position.y > 0.6) {
                vy += GRAVITY * delta;
                player.rotation.x -= 10 * delta;
            } else {
                player.position.y = 0.6;
                vy = 0;
                player.rotation.x = 0;
            }

            // Lane Physics - Speed-dependent snapping
            const laneSpeed = 10 + (currentSpeed * 0.1);
            player.position.x += (targetLane * laneWidth - player.position.x) * laneSpeed * delta;

            camera.position.z = player.position.z + 16;
            camera.position.x += (player.position.x * 0.4 - camera.position.x) * 5 * delta;
            camera.lookAt(player.position.x, 3, player.position.z - 12);

            if (player.position.z < nextObstacleZ) spawnObstacle();

            // Collision & Cleanup
            for (let i = obstacles.length - 1; i >= 0; i--) {
                const o = obstacles[i];
                if (o.position.z > player.position.z + 20) {
                    scene.remove(o);
                    o.geometry.dispose();
                    o.material.dispose();
                    obstacles.splice(i, 1);
                    continue;
                }

                const dz = Math.abs(player.position.z - o.position.z);
                const dx = Math.abs(player.position.x - o.position.x);
                if (dz < 1.1 && dx < 1.4) {
                    const hLimit = o.userData.type === "spike" ? 2.4 : 10;
                    if (player.position.y < hLimit) {
                        isGameOver = true;
                        document.getElementById('game-over').style.display = 'block';
                        document.getElementById('final-score').innerText = score;
                    }
                }
            }

            floors.forEach(f => { if (f.position.z > player.position.z + 100) f.position.z -= 1000; });
            composer.render();
        }
    </script>
</body>
</html>

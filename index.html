<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Neon Dash</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Arial Black', sans-serif; }
        #ui { position: absolute; top: 20px; left: 20px; color: #0ff; pointer-events: none; z-index: 10; font-size: 32px; text-shadow: 0 0 10px #0ff; }
        #start-screen, #game-over { 
            position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.9); 
            color: #0ff; display: flex; flex-direction: column; justify-content: center; 
            align-items: center; z-index: 100; text-align: center;
        }
        button { background: #0ff; color: #000; border: none; padding: 15px 40px; font-weight: bold; cursor: pointer; font-size: 20px; margin-top: 20px; }
    </style>
</head>
<body>
    <div id="start-screen">
        <h1>NEON DASH 3D</h1>
        <p>SPACE to Jump | ARROWS to Move</p>
        <button onclick="startGame()">START</button>
    </div>
    <div id="game-over" style="display:none">
        <h1 style="color:#ff0055">SYSTEM CRASH</h1>
        <p>Score: <span id="final-score">0</span></p>
        <button onclick="location.reload()">RETRY</button>
    </div>
    <div id="ui"><div id="score">0</div></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        let scene, camera, renderer, player, clock;
        let obstacles = [], floors = [];
        let score = 0, currentSpeed = 50, isGameOver = false, isPaused = true, targetLane = 0;
        const laneWidth = 4;
        let nextObstacleZ = -100;
        let vy = 0;
        const GRAVITY = -60;
        const JUMP_STRENGTH = 24;

        function startGame() {
            document.getElementById('start-screen').style.display = 'none';
            isPaused = false;
            clock.start();
        }

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x020105);
            scene.fog = new THREE.Fog(0x020105, 20, 120);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 7, 18);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // Lighting (Stronger so it's not black)
            const ambient = new THREE.AmbientLight(0xffffff, 0.5);
            scene.add(ambient);
            const light = new THREE.PointLight(0x00ffff, 2, 100);
            light.position.set(0, 10, 10);
            scene.add(light);

            // Player
            player = new THREE.Mesh(
                new THREE.BoxGeometry(1.2, 1.2, 1.2),
                new THREE.MeshStandardMaterial({ color: 0x00ffff, emissive: 0x00ffff, emissiveIntensity: 1 })
            );
            player.position.y = 0.6;
            scene.add(player);

            // Floor
            for(let i = 0; i < 10; i++) {
                const grid = new THREE.GridHelper(100, 10, 0x00ffff, 0x222222);
                grid.position.z = i * -100;
                scene.add(grid);
                floors.push(grid);
            }

            clock = new THREE.Clock(false);

            window.addEventListener('keydown', (e) => {
                if (isGameOver || isPaused) return;
                if (e.code === 'ArrowLeft' && targetLane > -1) targetLane--;
                if (e.code === 'ArrowRight' && targetLane < 1) targetLane++;
                if ((e.code === 'Space' || e.code === 'ArrowUp') && player.position.y <= 0.7) vy = JUMP_STRENGTH;
            });
        }

        function spawnObstacle() {
            const isSpike = Math.random() < 0.5;
            const geo = isSpike ? new THREE.ConeGeometry(1.6, 3.2, 4) : new THREE.BoxGeometry(3.5, 10, 2);
            const mat = new THREE.MeshStandardMaterial({ 
                color: isSpike ? 0xff0055 : 0xffff00, 
                emissive: isSpike ? 0xff0055 : 0xff7700, 
                emissiveIntensity: 1 
            });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.set((Math.floor(Math.random() * 3) - 1) * laneWidth, isSpike ? 1.6 : 5, player.position.z - 160);
            mesh.userData = { type: isSpike ? "spike" : "wall" };
            scene.add(mesh);
            obstacles.push(mesh);
            nextObstacleZ = player.position.z - (35 + Math.random() * 25);
        }

        function animate() {
            if (isGameOver) return;
            requestAnimationFrame(animate);
            if (isPaused) return;

            const delta = Math.min(clock.getDelta(), 0.05);
            currentSpeed += 1.0 * delta;
            player.position.z -= currentSpeed * delta;
            score = Math.floor(Math.abs(player.position.z) / 10);
            document.getElementById('score').innerText = score;

            // Physics
            player.position.y += vy * delta;
            if (player.position.y > 0.6) {
                vy += GRAVITY * delta;
                player.rotation.x -= 10 * delta;
            } else {
                player.position.y = 0.6;
                vy = 0;
                player.rotation.x = 0;
            }

            player.position.x += (targetLane * laneWidth - player.position.x) * 15 * delta;
            camera.position.z = player.position.z + 16;
            camera.position.x += (player.position.x * 0.4 - camera.position.x) * 5 * delta;
            camera.lookAt(player.position.x, 3, player.position.z - 12);

            if (player.position.z < nextObstacleZ) spawnObstacle();

            // Collision
            for (let i = obstacles.length - 1; i >= 0; i--) {
                const o = obstacles[i];
                if (o.position.z > player.position.z + 20) {
                    scene.remove(o);
                    obstacles.splice(i, 1);
                    continue;
                }
                const dz = Math.abs(player.position.z - o.position.z);
                const dx = Math.abs(player.position.x - o.position.x);
                if (dz < 1.1 && dx < 1.4) {
                    const hLimit = o.userData.type === "spike" ? 2.4 : 10;
                    if (player.position.y < hLimit) {
                        isGameOver = true;
                        document.getElementById('game-over').style.display = 'block';
                        document.getElementById('final-score').innerText = score;
                    }
                }
            }

            floors.forEach(f => { if (f.position.z > player.position.z + 100) f.position.z -= 1000; });
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
